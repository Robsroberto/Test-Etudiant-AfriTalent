<!DOCTYPE html>
<html lang="fr">
<head>
<title>AfriTalent - Contact</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="index.html">AfriTalent</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
        <li class="nav-item"><a class="nav-link" href="freelances.html">Freelances</a></li>
        <li class="nav-item"><a class="nav-link" href="tarifs.html">Tarifs</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">A propos</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
      </ul>
      <a href="contact.html" class="btn btn-sm btn-warning ms-3">Rejoindre AfriTalent</a>
      <button id="darkModeBtn" class="btn btn-sm btn-outline-light ms-2" aria-label="Activer le mode sombre">Mode sombre</button>
    </div>
  </div>
</nav>


<main class="py-5">
  <div class="container">
    <h1 class="text-center mb-4">Contactez-nous</h1>
    <form id="contactForm" class="mx-auto" style="max-width:500px" novalidate>
      <div class="mb-3"><label class="form-label">Nom</label><input type="text" class="form-control" id="nomInput" required></div>
      <div class="mb-3"><label class="form-label">Prenom</label><input type="text" class="form-control" id="prenomInput" required></div>
      <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="emailInput" required></div>
      <div class="mb-3"><label class="form-label">Sujet</label>
        <select class="form-select" id="sujetInput" required>
          <option value="">Choisir...</option>
          <option value="support">Support</option>
          <option value="partenariat">Partenariat</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" id="messageInput" rows="4" required></textarea></div>
      <button type="submit" class="btn btn-primary w-100">Envoyer</button>
      <p id="formFeedback" class="mt-2 text-success" style="display:none">Message envoye avec succes !</p>
    </form>
  </div>
</main>

<footer class="text-center py-4">
  <div class="container"><p>&copy; <span id="year"></span> AfriTalent. Tous droits reserves.</p></div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
